нципе. То есть для ИИ смысл всегда приходит извне, система его не переживает, как реальный опыт. Компьютер, сколь бы &quot;умным&quot; он не был, не оперирует смыслами – он оперирует физикой, которую мы интерпретируем как смыслы. <br/><br/><blockquote>Ждать сознания от алгоритма – все равно что ждать, что формула гравитации начнет притягивать объекты. </blockquote><br/><br/>Наконец-то кто-то это сформулировал <br/><a href=\"http://deepmind.google/research/publications/231971/\" target=\"_blank\" rel=\"noopener\">deepmind.google/research/publications/231971/</a>"},{"id":"9072","channel":"data_secrets","date":"2026-04-20T14:02:00+00:00","views":"12.1K","reactions":"58","mediaUrl":"https://cdn4.telesco.pe/file/KDZejnbAb-HcynsaJCBvQUzi9sG2LrRC58Dnf17CJ61fBIu2-8ipYM6sOy0-K09LP0vCMlbVilcQP_GKC4JoICa2y0d4-C-DOPak99uJ38qpkNMYcmNFqeL3kTJeDq1mOSRYe7I9fBctnKbNTbmJUfv8QjJ5TrL__UshQgbs059rLGpR3yspKq5Kq4_-skPYx0WzVISAMv82hgEdWB9_JD_I_We5GJAhn3HSVSlUFeg-kQFOSUY0M9ZvrCInlmvu8B4FvPr_whexx8BvD8mqvlIgE5iE96PWrfdOU3lM1-vXZYdUt6u_CpdR2_2y5roBqxOaXsTt1PYwi_av-ct_xQ.jpg","text":"«Сделано с ИИ»: Яндекс Практикум запускает премию для джунов и мидлов, которые используют нейросети в проектах<br/><br/>Яндекс Практикум открыл прием заявок на премию для специалистов с опытом до 5 лет, которые уже применяют нейросети в рабочих задачах так, чтобы они приносили измеримый результат для продукта или бизнеса.<br/><br/>Будет две основные номинации. В техно-продуктовой — проекты, где ИИ влияет на метрики: ускоряет процессы, снижает затраты или улучшает продукт. В креативной — кейсы с нестандартным использованием нейросетей, где они определяют формат и логику решения. Отдельно отметят участников в каждой номинации с опытом до двух лет— для них предусмотрен спецприз «Будущее за ним».<br/><br/>Из интересного: в Практикуме говорят, что спрос на ИИ-навыки уже хорошо виден по рынку. Например, популярность курсов по «Нейросети для…» разных задач за 2025 год выросла в 17 раз. То есть кейсы «сделано с ИИ» потенц ть в такой модели глубина нейросети получается не за счет множества разных слоев, а за счет многократного прохождения одного блока. Надо сказать, что на каждом шаге еще учитываются LoRA‑адаптеры по глубине, так что каждый шаг цикла вычислительно уникальный, хотя базовые веса одни и те же. <br/><br/>3. Coda – заключительные слои, которые работают еще один раз после цикла, чтобы сформировать финальные логиты.<br/><br/>Это идея так называемого рекуррентного рассуждения в латентном пространстве. <b>Мы уходим от привычного ризонинга chain‑of‑thought в токен‑пространстве к гибкому ризонингу в скрытых слоях.</b> Если нужно думать дольше, модель не генерирует больше токенов, а наращивает количество внутренних прогонов, уточняя ответ. <br/><br/>Красивая гипотеза, конечно. Верить ей или нет, решать вам. <br/><br/>Весь код можно покрутить <a href=\"https://github.com/kyegomez/OpenMythos\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">вот здесь</a>. В исходной имплементации в модели всего 770M параметров, но другие разработчики уже начинают скейлить идею и проверять архитектуру на более крупных моделях. Интересно, что из этого выйдет."},{"id":"4538","channel":"ai_newz","date":"2026-04-20T12:44:20+00:00","views":"14.4K","reactions":"56","text":"<b>Нейродайджест за неделю (#114)</b><br/><br/><u>LLM</u><br/>- <a href=\"https://t.me/ai_newz/4532\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">Anthropic жмет подписки</a> — Компания меняет прайсинг для энтерпрайз-пользователей. Убирают тиры, оставляют базовую подписку, а всё сверх лимитов — по ценам API. Цены для активных юзеров могут вырасти в 2-3 раза.<br/>- <a href=\"https://t.me/ai_newz/4534\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">Веса Qwen 3.6</a> — 35B-A3B модель, которая теперь обгоняет Qwen 3.5 27B dense за счёт большей разговорчивости.<br/>- <a href=\"https://t.me средоточиться на какой-то задаче или выступлении, попрогонять в голове спич ну и так далее, эдакая тренировка слеш репетиция слеш медитация. А всё…"},{"id":"5219","channel":"gonzo_ML","date":"2026-04-20T17:56:45+00:00","views":"1.02K","reactions":"3","text":"И ещё про развитие ветки Universal Transformer (см.вчерашнее <a href=\"https://t.me/gonzo_ML/5206\" target=\"_blank\" rel=\"noopener\">https://t.me/gonzo_ML/5206</a>). <br/><br/>Интересно про трёхфазовый гроккинг:<br/><blockquote>На ранних этапах обучения сеть просто запоминает данные. Дальнейшее обучение запускает фазовый переход к in-distribution обобщению, и, наконец, появляется систематическое out-of-distribution обобщение.</blockquote><br/><br/><b>Loop, Think, &amp; Generalize: Implicit Reasoning in Recurrent-Depth Transformers</b><br/><i>Harsh Kohli, Srinivasan Parthasarathy, Huan Sun, Yuekun Yao</i><br/>Статья: <a href=\"https://arxiv.org/abs/2604.07822v1\" target=\"_blank\" rel=\"noopener\">https://arxiv.org/abs/2604.07822v1</a><br/>Репа: <a href=\"https://github.com/OSU-NLP-Group/Loop-Think-Generalize\" target=\"_blank\" rel=\"noopener\">https://github.com/OSU-NLP-Group/Loop-Think-Generalize</a><br/>Ревью: <a href=\"https://arxiviq.substack.com/p/loop-think-and-generalize-implicit\" target=\"_blank\" rel=\"noopener\">https://arxiviq.substack.com/p/loop-think-and-generalize-implicit</a><br/><br/><b># TL;DR</b><br/><br/><b>ЧТО сделали:</b><br/>Оценивают, могут ли трансформеры с рекуррентной глубиной (зацикленные) выполнять неявные многошаговые рассуждения (implicit multi-hop reasoning) над параметрическими знаниями без явного CoT. Прогоняя входные данные через одни и те же слои много раз, модель выучивает правила и начинает систематически обобщаться на незнакомые комбинации фактов, а также экстраполировать логику на глубину, сильно превышающую ту, что была при обучении.<br/><br/><b>ПОЧЕМУ это важно:</b><br/>Работа предлагает архитектурное решение проблемы композициональности, от которой страдают стандартные трансформеры. Перенося вычислительную нагрузку с фиксированного количества параметров (глубины) на динамическую рекуррентность во время инференса, авторы показывают масштабируемый механизм для скрытых рассуждений. Это доказывает, что модели могут внутренне разворачивать сложную логику, чтобы решать out-of-distribution задачи, просто &quot;думая&quot; дольше.<br/><br/><b>Для практиков:</b><br/>Для тех, кто исследует масштабирование вычислений на инференсе, это отличная демонстрация того, как рекуррентные архитектуры обходят жёсткие ограничения обычных трансформеров на количество слоёв. За счёт стабилизации итеративного разворачивания и внедрения адаптивной остановки на основе энтропии, модель достигает отличной обобщающей способности через резкую фазу грокинга. При этом авторы честно показывают верхнюю границу такого скейлинга — чрезмерное обдумывание (overthinking), что задаёт стратегические рамки для применения test-time compute в базовых моделях.<br/><br/>В глубины: <a href=\"https://t.me/gonzo_ML_podcasts/3279\" target=\"_blank\" rel=\"noopener\">https://t.me/gonzo_ML_podcasts/3279</a>"},{"id":"5220","channel":"gonzo_ML","date":"2026-04-20T17:58:28+00:00","views":"933","reactions":"","fwd_from":"gonzo_ML_podcasts","fwd_link":"https://t.me/gonzo_ML_podcasts/3283","mediaUrl":"https://cdn4.telesco.pe/file/hcTNiQr3PfwIRc1pBT2eED3oTJb6HEzjZtl-uTl_KnZMuanWSQBpsiLf4bFDrhW-n_VHzDwSyeJE8CJ5bCjAG2RUcS8NY8C5t6j15_um2Uuce0Iz_fCXs38IfaQKncnxtissiERFyK0L8MMvGKL04Fs5qfLeHe1Z4icXu-bJs1J1y8uBi_v6fIXm4h8gku4wgCvnEKsnCIc2_-U-IWZOD4Rkd5KDhl7ydcE_kWxDUZJL2DIfOKd9ne-Jp7-07TvAu6WJ_XVKlmm1hjbbVPcr_gj2kYCos1sPGg_z0lwxancg4gXcrZ7Ree-JlprWR0U47J4Nf7ic29R-e3uJlueNEQ.jpg","text":""},{"id":"5221","channel":"gonzo_ML","date":"2026-04-20T17:58:33+00:00","views":"1.02K","reactions":"","fwd_from":"gonzo_ML_podcasts","fwd_link":"https://t.me/gonzo_ML_podcasts/3282","mediaUrl":"https://cdn4.telesco.pe/file/Ny4UAXRjEpgGPw9NrNiRSZ8qfKxB5xtbT7c-eqLQhafu2MOgAynyrqgeFsnnOFmOSeZlvxkB80daXEom9nmEaUpfLu во времени, что критично в динамичных сценах: без надёжной детекции завершения шага агент не понимает, повторять ли попытку или переходить к следующему этапу плана.<br/><br/><blockquote>По безопасности DeepMind заявляет лучший результат в линейке: модель стабильнее соблюдает физические ограничения и точнее распознаёт травмоопасные ситуации (+6% на текстовых сценариях и +10% на видео по сравнению с Gemini 3.0 Flash).</blockquote><br/><br/>Gemini Robotics-ER 1.6 доступна через Gemini API и <a href=\"https://aistudio.google.com/prompts/new_chat?model=gemini-robotics-er-1.6-preview\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">Google AI Studio</a>. Deepmind также собрал <a href=\"https://github.com/google-gemini/robotics-samples/blob/main/Getting%20Started/gemini_robotics_er.ipynb\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">Colab</a> с примерами промптов для типовых задач воплощенного ризонинга.<br/><br/><br/><a href=\"https://t.me/ai_machinelearning_big_data\" target=\"_blank\">@ai_machinelearning_big_data</a><br/><br/><a href=\"?q=%23news\">#news</a> <a href=\"?q=%23ai\">#ai</a> <a href=\"?q=%23ml\">#ml</a>"},{"id":"9932","channel":"ai_machinelearning_big_data","date":"2026-04-20T10:24:52+00:00","views":"15.2K","reactions":"248","fwd_from":"Анализ данных (Data analysis)","fwd_link":"https://t.me/data_analysis_ml/5003","mediaUrl":"https://cdn4.telesco.pe/file/bGN8D5cxidRcPtgfOKmL0SWzHJtLXjDSXmWgFJmwGExIdbOqxgv_mOx9I70Cn56xt8dNz12eIcONaK6qzSJyT64EeOczUNzyB6YdqxdDP9yuDm-TT4rHkqcwvP9WtoWJQ1VcFSbd5_U4_b29S6qiMclkDiTnUFfSrmuSg4tKZw4bjvKAytGz95f7IjxDJIcBDlkfql5j7fL_lL-C_fEEZNbb1J4WiVfFMSV24nJqKhrjF-UWa1voCWn4DZfweBO5BEfL-5AI4hXjzu29DMY0CKiNQTtjiYYDBtunk3hSXl2e9fggXY0uSCbT3KxwPFOpRzDCkFuyLurtJOyYtbtVCQ","text":"<i class=\"emoji\"><b>⚡️</b></i> <b>Андрей Карпаты высказал про дизайн ИИ-моделей мысль, которую большинство упускает из виду.</b><br/><br/>Его тезис: передовые модели не потому огромные, что технология сложная, а потому что данные для обучения мусорные.<br/><br/>Когда обычный человек думает про интернет, ему в голову приходят статьи Wall Street Journal, Википедия, серьёзные тексты. <br/><br/>Так вот, датасет для предобучения выглядит иначе. Если открыть случайные документы из реального корпуса, то там будут тикеры акций, битый HTML, спам и бессвязный текст.<br/>По одной из оценок, Llama 3 сжимает информацию со скоростью всего 0.07 бита на токен. То есть модель помнит большую часть обучающих данных смутно.<br/><br/>Поэтому мы и строим модели на триллион параметров не потому, что нам нужен мозг такого размера, а потому что нужен движок сжатия такого масштаба, чтобы выжать хоть какой-то интеллект из потока шума. Большая часть параметров работает памятью, а не мышлением.<br/><br/>Предложение Карпаты - разделить эти две функции. Построить <b>когнитивное ядро </b>- модель, в которой остались только алгоритмы рассуждения и решения задач, без энциклопедического заучивания. <br/><br/>А рядом поставить внешнюю память, к которой модель обращается за фактами.<br/><br/>По его прогнозу, когнитивное ядро, обученное на качественных данных, способно выйти на настоящий интеллект при размере около миллиарда параметров. Для сравнения: флагманские модели сегодня крутятся в диапазоне от 200 миллиардов до 1.8 триллиона параметров, и большая часть этого веса уходит на запоминание интернет-помойки.<br/><br/>GPT-4o работает примерно на 200 миллиардах параметров и обходит оригинальный GPT-4 на 1.8 триллиона. Стоимость инференса на уровне GPT-3.5 с 2022 по 2024 упала в 280 раз, и почти весь этот выигрыш дали модели меньшего размера, обученные на более чистых данных с более продуманной архитектурой.<br/><br/>Настоящим узким местом ИИ сейчас является качество данных.<br/><br/><a href=\"https://t.me/data_analysis_ml\" target=\"_blank\">@data_analysis_ml</a>"},{"id":"9933","channel":"ai_machinelearning_big_data","date":"2026-04-20T15:33:20+00:00","view i</a><br/><i class=\"emoji\"><b>🔗</b></i> Tech blog: <a href=\"https://kimi.com/blog/kimi-k2-6\" target=\"_blank\" rel=\"noopener\">https://kimi.com/blog/kimi-k2-6</a><br/><i class=\"emoji\"><b>🔗</b></i> Weights &amp; code: <a href=\"https://huggingface.co/moonshotai/Kimi-K2.6\" target=\"_blank\" rel=\"noopener\">https://huggingface.co/moonshotai/Kimi-K2.6</a><br/><br/><a href=\"http://t.me/ai_machinelearning_big_data\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">@ai_machinelearning_big_data</a><br/><br/><a href=\"?q=%23KIMI\">#<b>KIMI</b></a>"},{"id":"699","channel":"kantor_ai","date":"2026-04-20T11:17:35+00:00","views":"2.24K","reactions":"27","mediaUrl":"https://cdn4.telesco.pe/file/k8sQAva1m00OQ3j78_yxOAWOLHYv5ZXJAsQ8UJzBkytLYA9jwWFw4eYtVmj0paucknuwwdOoEvWRt9altfuKQcZXaKEKwMhwwv9jzhzLtBeHpKrCgWNl8ugRc8F7pux5-eJX9y_XkXSpV-pWFdqwTxDXIOz17d5YDMPBClgxes3WguwNB67iEvKHGXhYpRINnq4Oe3zwiXWeNEat_2M4mfVnXpHLR6hVdLzR64UE0E3d0YzsMVzryhVqtyWRleql6ZkwCJVe5G9OFqQqEIdsTVgdTTjnVxX3nmXamei9pLbMInK2x2xOTPyw_4gBxvBRYcmJVAhIlyTre4Aa0JgA-Q.jpg","text":"<b>Цены на высшее образование</b><br/><br/>Когда я учился в МФТИ, думал, что на платное туда поступать дело бессмысленное, только деньги родителей тратить, т.к. если даже поступить на бесплатное не смог, то уж точно вылетишь.<br/><br/>На деле же, пока я учился, я увидел как минимум один пример человека, который начал на платном на ФАЛТе (на этом факультете был самый низкий проходной балл), а закончил на бесплатном на ФИВТе (там один из самых высоких на тот момент), а потом стал успешным МЛщиком, а затем СТО и предпринимателем (кстати с успешными экзитами, насколько я знаю). <br/><br/>Но в подавляющем большинстве случаев мой предрассудок оказался верным, и платники постоянно ходили в академ, вылетали, перепоступали или, если говорить уже о нашем времени, уходили куда-нибудь на ФКН учиться. Никоим образом не принижаю ФКН, место хорошее, это просто у нас на физтехе есть традиция устраивать стресс-тест студентам, а ФКН как раз таким не страдает.<br/><br/>Так или иначе, в СМИ попали расценки российских вузов на платное образование, и МФТИ устроил себе неплохую рекламу, заняв первую строчку :) Я вижу в этом много плюсов. Во-первых, комментаторы в интернете теперь узнают, что есть какой-то там МФТИ (Физтех же в целом всегда был вузом из разряда if you know you know, широкие массы были не в курсе). Во-вторых, родители смогут в очередной раз подумать, а надо ли тратить деньги, если ребенок не попал в МФТИ на бесплатное (если речь про бакалавриат). <br/><br/>Минусы тоже понятные. Любые экзамены это лотерея, а «не поступивший» все же не равно «не способный». Ошибки случаются, исключения бывают, но цена исправления ошибки теперь возросла. <br/><br/>Что можно посоветовать тем, кто поступает? Участвуйте в олимпиадах, их сейчас вроде бы много, уж где-нибудь пробьетесь, если много раз попытаться.<br/><br/>А еще могу посоветовать не быть слишком доверчивым к табличкам в интернете и проверять источники. Если посмотреть <a href=\"https://pk.mipt.ru/bachelor/2026_cost/\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">расценки</a> в МФТИ, окажется, что все программы стоят по миллиону, а 2 млн - это стоимость на какой-то особой программе про бизнес и стартапы, и она там <a href=\"https://pk.mipt.ru/bachelor/2026_cost/\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">такая же была и в 2025 году.</a> В МГИМО кстати <a href=\"https://mgimo.ru/upload/2026/04/stoimost-obucheniya-po-programmam-bakalavriat-dlya-grazhdan-rf-nabora-2026-goda.pdf\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">похожая история:</a> есть солидное направление для солидных господ про инвестиции и все такое, а есть все остальные, на 20-40% дешевле."},{"id":"700","channel":"kantor_ai","date":"2026-04-20T14:06:38+00:00","views":"1.72K","reactions":"42","text":"<b>Forbes 30u30 2026</b><br/><br/>Тем временем <a href=\"https://30-under-30.forbes.ru/2026\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">сегодня последний день голосования</a> за участников лонг-листа Forbes 30 до 30 этого года. Отношение к разного рода рейтингам у всех очень разное, но лично в моей карьере Forbes30u30 сыграл крайне положительную роль, и благодаря этому рейтингу у меня сейчас есть многое, чего я вообще не ожидал :)<br/><br/>В этом году у меня два фаворита среди участников: <b>Таня Гайнцева в номинации «наука и технологии»</b> и <b>Вова Абазов в «управлении»</b>. <br/><br/>Про Таню я уже писал в канале, добавлю только, что всегда радуюсь, когда чем-то отмечают преподавателей, особенно каких-нибудь бесплатных курсов. По своему опыту с 9 годами Data Mining in Action знаю, какой это колоссальный труд и как нетривиально его продолжать. Так что призываю голосовать за Таню уж как минимум всех, кто когда-то смотрел лекции Deep Learning School. А лучше просто всех)<br/><br/>Ну а что касается Вовы Абазова - чел вообще красавчик, в очень молодом возрасте стал CDO в крупной компании и дальше не снижает планку и достойно представляет молодежь в менеджменте. Вове от всей души желаю и дальше доказывать, что в биг боссы можно брать не только лишь 45-55 летних. Прецеденты вроде этого создают новые возможности для молодых управленцев в будущем."},{"id":"1724","channel":"ProductsAndStartups","date":"2026-04-20T05:44:30+00:00","views":"2.39K","reactions":"63","mediaUrl":"https://cdn4.telesco.pe/file/X5hfdnkIcrhmMAFiaudmgMGQGKxPROhTOFp_bPeM34jgSfTnRmfRVn99QanyFIvap8M4pi4uLbMqoDHJ80iYpjhndq16EcIth2IUuvOrVx0_16galc0q94IDzyhH1Gi4BRvLbECKDtzOfF4SzkFoON2UKI_UmgyWyGukvbQpw9l9prloHcyscJ2rhUxzZ9hWJ4lslShGBHY3zmlZiyGG-Qyfyp3c5A29-TDYH-4twigr61JuW5cmD70twodmM6wuvFWkF59AubUThhxlVY6wHUVZnu7MZBM9oxHIRQSj8wUSg3rCQKNCnQLtYM5e4i-0NdTmM4i3aTM1zltyy1icEw.jpg","text":"Куда утекают мои Claude Code токены? Скилл token-audit<br/><br/>В последнее время муравьи все чаще закручивают гайки с лимитами и я стал регулярнее упираться в недельные лимиты. Мне это надоело и решил запилить <a href=\"https://github.com/BayramAnnakov/token-audit-skill\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">скилл</a>, который аудирует ваш расход токенов и советует что с этим делать<br/><br/>Например, проблемы что он находит:<br/>- вы юзаете opus там, где можно и sonnet<br/>- у вас раздутый <a href=\"http://claude.md/\" target=\"_blank\" rel=\"noopener\">claude.md</a>, который вставляется в каждое сообщение<br/>- у вас какой-то крон случайно триггерится каждые 5 мин, вместо каждого часа<br/>- вошёл в поток и раздул контекст, хотя надо было сделать compact или вообще начать новую сессию<br/><br/><pre>/plugin marketplace add BayramAnnakov/token-audit-skill<br/><br/>/plugin install token-audit@token-audit-skill</pre><br/><br/>Буду рад, если попробуете и поделитесь, посоветовал ли скилл что-нибудь внятное."},{"id":"285","channel":"the_ai_architect","date":"2026-04-20T10:28:01+00:00","views":"1.96K","reactions":"12","text":"<b>Топ популярных вопросов по курсу</b><br/><br/><i class=\"emoji\"><b>◾️</b></i> <b>Почему курс именно для разработчиков?</b><br/><br/>Потому что я сам разработчик и знаю как использовать этот AI рычаг разработчикам.<br/><br/><i class=\"emoji\"><b>◾️</b></i> <b>Подойдёт ли мне курс?</b><br/><br/><i class=\"emoji\"><b>🚫</b></i> Нет, если вам не важен код, который пишет ai агент, потому что этот код через несколько месяцев будет в мусорной урне. Этот курс вам будет не интересен.<br/><br/><i class=\"emoji\"><b>🚫</b></i> Нет, если у вас отсутствует опыт в разработке, но вы хотите выполнять работу разработчика. Тут я просто не смогу вам помочь, у меня нет подходящей квалификации для этого.<br/><br/><i class=\"emoji\"><b>👍</b></i> Да, если вы разработчик, который пользуется AI (часто, редко, или только начинает), но качество результата не стабильно.<br/><br/><i class=\"emoji\"><b>👍</b></i> Да, если вы разработчик и переживаете о том, что в будущем вы не сможете поддерживать ваш код без AI.<br/><br/><i class=\"emoji\"><b>👍</b></i> Да, если вы разработчик, умеете пользоваться ai агентами, но вам не хватает системности и кажется, что многое упускаете. Не знаете, как устроен ai агент под капотом и не понимаете зачем вам вообще это знать.<br/><br/><i class=\"emoji\"><b>◾️</b></i> <b>Что будет на курсе?</b><br/><br/>С учениками мы начнём с базы (промпты, контекст, фидбек луп и т. д.), а потом пройдёмся по всему циклу SDLC: проектирование, разработка, тестирование, деплоймент, поддержка.<br/><br/><i class=\"emoji\"><b>◾️</b></i> <b>Неужели в 2026 в наших кругах кто-то не умеет писать промпты?</b><br/><br/>Да, представьте себе&#33;<br/><br/>Тут нет речи про какие-нибудь магические слова, а скорее понимание того, как именно работает ai агент и какая информация ему доступна. Ну и ещё, конечно же, способность правильно формулировать задачу другому человеку (или агенту). <br/><br/>Я уже понял, что тут пока сам не увидишь на практике, как это должно быть, не поймёшь.<br/>Тоже самое и про контекст и про фидбек луп.<br/><br/><a href=\"https://ai.khakhalev.com/course/?utm_source=post_284&amp;amp;utm_medium=url&amp;amp;utm_campaign=sup\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">Детали курса</a>"},{"id":"286","channel":"the_ai_architect","date":"2026-04-20T14:04:01+00:00","views":"1.6K","reactions":"17","text":"Кстати, возможно не всем будет понятно, что такое этот ваш SDLC.<br/><br/><blockquote><b>SDLC</b> (Software Development Life Cycle, жизненный цикл разработки программного обеспечения) — это структурированный процесс, описывающий этапы создания высококачественного ПО от идеи до поддержки.<br/></blockquote><br/>По сути, это стандарт, по которому сейчас пишется почти всё ПО. <br/><br/>Даже если вы не слышали про такой термин, то как разраб вы всё равно знали все эти этапы, но возможно не во всех участвовали.<br/><br/>И из-за этого происходит примерно вот такая ситуация:<br/>Разраб даёт AI агенту задачу сгенерить код для части задачи, а потом пытается вручную проверять каждую сгенеренную строку. Итог - тратит на этот процесс примерно столько же времени, как если бы он писал этот код сам. А к концу дня, голова пухнет и он уже не хочет никакой AI.<br/><br/><b>Как должно быть правильно?</b><br/><br/>Вместе с AI планируете задачу целиком, заранее прорабатываете все этапы SDLC, сразу понимаете что вас ждёт и самое главное в конце - составляете критерии приемки, по которым в конце будете принимать работу от AI агента.<br/><br/>Именно этому я учу на курсе. Если вам релевантно - <a href=\"https://ai.khakhalev.com/course/?utm_source=post_285&amp;amp;utm_medium=url&amp;amp;utm_campaign=sup\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">велкам</a>."},{"id":"3852","channel":"boris_again","date":"2026-04-20T11:22:01+00:00","views":"960","reactions":"27","fwd_from":"(sci)Berloga Всех Наук и Технологий","fwd_link":"https://t.me/sberlogabig/643","mediaUrl":"https://cdn4.telesco.pe/file/XJTcDEfrR3PRjeD13Si7BiTQO_auQIWEUWpi4mCODLEImXPaMCPt-Ed-2E4o3P9_HGvWxpQCx33Q13G4Mkwzde9aDUE2AyDNvseZ97vpR9YJSY6Fyo91XdEABCGRgfbjR6ONU3TsRuY8Yx5bNhjfc5SW2GOQhefsMSDMiBOTgodJji69oMIJmGeBBt3b7Nc4LFbYU9iha1QV5aAqt0qY-yg_LpRQOAsrp40eDNBUaFl-v679QfAW65zNd_g_vLltHcdtYN9w4PJubVafixvmhhsIFMINuOfUYXB9I5vSBL07TPwVzSbRIPliQFEYrWUBBRbU9UnH77pKVeIh680MHQ.jpg","text":"<i class=\"emoji\"><b>🚀</b></i> Серия соревнований по МЛ и научный проект &#33; Денежный призовой фонд больше 100 000 р и будет расти &#33; Кому интересен МЛ/RL или математика или пазлы или роботы. <br/><br/>Приглашаем Вас принять участие в серии челленджей и развитии научного опен-соурс проекта. <br/><br/>Соревнование организуется совместно с учеными лаборатории интеллектуальных технологий робототехники<a href=\"https://fund.mipt.ru/news/stavim-mirovoy-rekord- 4J_oIZw9gSkS4nuAm_BneBkMWQEp1advratpVCtXUIBGXVQu5lKL7WyumyqwUnfLwQYqV_Juq2Goeva2wzcFtXU76Voy4bJgc92X-SCKp55pfx2-izAN_b1fIlJsSlsBiym_mCG9xYjxJHBrizIRJQyj6fnOA.jpg","text":"Вчера случайно отравился и нарушил свой 2-недельный green streak recovery, решил на досуге поглубже изучить как работает пищеварение Любая ошибка или проблема → повод узнать что-то новое, вызвать гиперкомпенсацию &quot;микротравмы в своей модели мира&quot;"},{"id":"545","channel":"c3po_notes","date":"2026-04-20T09:42:56+00:00","views":"1.02K","reactions":"29","text":"Полтора года назад вышло нашумевшее эссе в блоге Anu Atluru Working Theorys <a href=\"https://www.workingtheorys.com/p/taste-is-eating-silicon-valley\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">«Taste Is Eating Silicon Valley»</a>. Главная мысль там была такая: в эпоху AI софт стал коммодитизированным, значит новым оружием основателей становится вкус, а Arc и Linear — флагманы этой новой эпохи. Это был, по сути, ответ сквозь изменившуюся эпоху на эссе 2011 года Марка Андриссена <a href=\"https://a16z.com/why-software-is-eating-the-world/\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">«Software was eating the world»</a>. Понятно, почему этот текст так резонировал: мне самому хочется жить в мире, где красиво сделанный продукт побеждает некрасивый, а деньги в итоге перетекают в UX. Однако реальность устроена иначе.<br/><br/>Вкус — не moat. Эту рамку я уже разбирал в <a href=\"https://t.me/c3po_notes/257\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">тексте</a> про фундаментальные силы роста и защиты: если смотреть на moats через <a href=\"https://www.goodreads.com/book/show/33014624-7-powers\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">7 Powers</a>, сил 7, но <a href=\"https://www.nfx.com/post/defensibility-most-value-for-founders\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">по NFX</a> долгосрочную защиту дают только четыре: scale economies, network effects, switching costs и brand. Вкус в этот набор не входит. Ближе всего он к Cornered Resources: уникальной способности конкретной команды делать красивый продукт. Это реальная сила, но она обычно подпитывает УТП только на старте, а потом размывается. Люди уходят, подходы перенимаются, эстетика превращается в отраслевой стандарт. То же самое происходит и с Process Power: процессы копируются. Даже такие уникальные системы, как у Toyota или Pixar, в итоге научились воспроизводить. Process Power это скорее способ защищать уже созданное доминирование. Лендинги Linear срисовали все, UI Arc повторили в других браузерах. По сути, Atluru смешала value added и moat — то есть конкуренцию через дифференциацию по Портеру и барьер для входа.<br/><br/>Полтора года спустя у нас уже есть неплохой тест этой гипотезы. Arc в мае 2025 ушёл в режим поддержки, а Josh Miller сам написал про «novelty tax». The Browser Company купил Atlassian за &#036;610M. Claude, канонический tastemaker по версии самой Atluru, держит только 2–4% потребительского рынка. При этом среди компаний, которые впервые выбирают AI-решение, Claude выигрывает около 70% прямых сравнений. Это важное различие: в B2B покупатель делает более рациональный выбор, считает окупаемость, и вкус там конвертируется через качество продукта и зарождающийся Brand Power. В потребительском сегменте, где решает то, что уже под рукой, и каналы дистрибуции, этого уже недостаточно.<br/><br/>Доля ChatGPT на рынке упала с 87% до 68% (правда, справедливости ради, не за счет собственного падения, а за счет роста рынка). Его начали отъедать две мощные дистрибуционные машины, и обе опираются на вполне классические силы из тех же 7 Powers. Gemini через Android, Chrome и дефолт в Workspace, то есть через Cornered Resources в виде эксклюзивных каналов. Meta AI через WhatsApp и Instagram, то есть через эксплуатацию их network effects. Суммарно это даёт доступ почти к миллиарду пользователей.<br/><br/>Andrew Chen в последний год пишет примерно о том же, но с обратной стороны. В <a href=\"https://andrewchen.substack.com/p/revenge-of-the-gpt-wrappers-defensibility\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">«Revenge of the GPT Wrappers»</a>: если AI-модели коммодитизировались, в игру возвращаются классические moats, только цикл сжат до 2–3 лет. В <a href=\"https://andrewchen.substack.com/p/the-growth-maze-vs-the-idea-maze\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">«Growth Maze vs Idea Maze»</a>: в поздней фазе S-кривой лучшая идея без канала проигрывает средней идее с каналом. В <a href=\"https://andrewchen.substack.com/p/the-end-of-the-1-billion-active-user\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">«End of the 1 billion active user»</a>: эпоха лёгкого потребительского роста закончилась — мобильная реклама подорожала, виральность ослабла, SEO и PR хуже переносятся в мобильный мир. Плюс экономика: потребительский AI зажат между ARPU в &#036;2–5 и инференсом в &#036;20–50. Без встроенной дистрибуции массовый рынок не собрать.<br/><br/>Chen добавляет то, что Atluru пропустила: в AI-эпоху дистрибуция стала не проще, а сложнее и дороже. Чем легче навайбкодить продукт за выходные, тем жёстче конкуренция за каналы, которые нельзя скопировать так же быстро.<br/><br/>Рабочая формула для меня сейчас такая: taste is table stakes, distribution is the moat. Вкус — это не защита, а уже гигиенический минимум. Пол, а не потолок. Без него тебя выбросят с рынка быстрее, чем раньше, но потолок по-прежнему строится из долгосрочных рвов: network effects, scale economies, switching costs и brand. AI не отменил эти правила, а просто ускорил таймер и резко поднял цену дистрибуции."},{"i       if (diff < 60) return "сейчас";
      if (diff < 3600) return `${Math.floor(diff / 60)}м`;
      if (diff < 86400) return `${Math.floor(diff / 3600)}ч`;
      if (diff < 604800) return `${Math.floor(diff / 86400)}д`;
      return date.toLocaleDateString("ru-RU", { day: "numeric", month: "short" });
    }

    function filterByPeriod(posts, period) {
      if (period === "all") return posts;
      const now = new Date();
      const cutoff = new Date();
      switch (period) {
        case "24h": cutoff.setHours(now.getHours() - 24); break;
        case "today": cutoff.setHours(0, 0, 0, 0); break;
        case "week": cutoff.setDate(now.getDate() - 7); break;
        case "month": cutoff.setMonth(now.getMonth() - 1); break;
      }
      return posts.filter((p) => new Date(p.date) >= cutoff);
    }

    function PostRow({ post }) {
      const [imgError, setImgError] = useState(false);
      const color = getChannelColor(post.channel);
      const postUrl = `https://t.me/${post.channel}/${post.id}`;

      return (
        <div style={{ padding: "10px 12px", borderBottom: "1px solid #f0f0f0" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
            <span style={{
              width: 22, height: 22, borderRadius: "50%", background: color,
              display: "inline-flex", alignItems: "center", justifyContent: "center",
              color: "#fff", fontSize: 11, fontWeight: 700, flexShrink: 0,
            }}>
              {post.channel[0].toUpperCase()}
            </span>
            <span style={{ fontSize: 13, fontWeight: 600, color: "#1a1a1a", flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
              @{post.channel}
            </span>
            <span style={{ fontSize: 11, color: "#aaa", flexShrink: 0 }}>{timeAgo(post.date)}</span>
          </div>
          {post.fwd_from && (
            <div style={{ fontSize: 11, color: "#8e8e93", marginBottom: 4, paddingLeft: 30 }}>
              ↩ {post.fwd_from}
            </div>
          )}
          {post.mediaUrl && (
            <div style={{ paddingLeft: 30, marginBottom: 6 }}>
              {imgError ? (
                <div style={{
                  width: "100%", height: 120, borderRadius: 8,
                  background: "#f5f5f5", display: "flex", alignItems: "center",
                  justifyContent: "center", fontSize: 28, color: "#ccc",
                }}>🖼</div>
              ) : (
                <img src={post.mediaUrl} alt=""
                  onError={() => setImgError(true)}
                  style={{ width: "100%", borderRadius: 8, objectFit: "cover", maxHeight: 300, display: "block" }} />
              )}
            </div>
          )}
          <div
            className="tg-post"
            style={{ paddingLeft: 30, fontSize: 14, lineHeight: 1.55, color: "#333", wordBreak: "break-word" }}
            dangerouslySetInnerHTML={{ __html: post.text }}
          />
          <div style={{ display: "flex", gap: 12, marginTop: 4, paddingLeft: 30, fontSize: 11, color: "#aaa", alignItems: "center" }}>
            {post.views && <span>👁 {post.views}</span>}
            {post.reactions && <span>❤️ {post.reactions}</span>}
            <span style={{ flex: 1 }} />
            <a href={postUrl} target="_blank" rel="noopener noreferrer"
              style={{ color: "#2AABEE", textDecoration: "none", cursor: "pointer" }}>
              Открыть →
            </a>
          </div>
        </div>
      );
    }

    function TelegramDigest() {
      const [period, setPeriod] = useState("24h");
      const [channelFilter, setChannelFilter] = useState("all");

      const allChannels = useMemo(() => [...new Set(POSTS_DATA.map((p) => p.channel))], []);

      const filtered = useMemo(() => {
        let posts = filterByPeriod(POSTS_DATA, period);
        if (channelFilter !== "all") {
          posts = posts.filter((p) => p.channel === channelFilter);
        }
        return posts.sort((a, b) => new Date(b.date).getTime() - new Date(a.date).getTime());
      }, [period, channelFilter]);

      return (
        <div style={{ padding: "12px 0", fontFamily: "-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" }}>
          <style>{`
            .tg-post a { color: #2AABEE; text-decoration: none; }
            .tg-post a:hover { text-decoration: underline; }
            .tg-post b, .tg-post strong { font-weight: 600; }
            .tg-post i, .tg-post em { font-style: italic; }
            .tg-post s, .tg-post del, .tg-post strike { text-decoration: line-through; color: #999; }
            .tg-post code { background: #f5f5f5; padding: 1px 4px; border-radius: 3px; font-size: 12px; }
            .tg-post pre { background: #f5f5f5; padding: 8px; border-radius: 6px; overflow-x: auto; font-size: 12px; }
            .tg-post blockquote { border-left: 3px solid #2AABEE; margin: 6px 0; padding: 4px 10px; color: #555; background: #f9f9f9; border-radius: 0 4px 4px 0; }
            .tg-post .tg-spoiler { background: #333; color: #333; border-radius: 3px; padding: 0 3px; cursor: pointer; transition: all 0.2s; }
            .tg-post .tg-spoiler:hover, .tg-post .tg-spoiler.revealed { background: transparent; color: inherit; }
            .tg-post br { display: block; content: ""; margin: 4px 0; }
          `}</style>
          <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between", marginBottom: 10, padding: "0 12px" }}>
            <h2 style={{ margin: 0, fontSize: 17, fontWeight: 700 }}>Telegram Digest</h2>
            <span style={{ fontSize: 11, color: "#aaa" }}>
              {filtered.length} постов
            </span>
          </div>
          <div style={{ display: "flex", gap: 4, marginBottom: 8, padding: "0 12px" }}>
            {Object.keys(PERIOD_LABELS).map((p) => (
              <button key={p} onClick={() => setPeriod(p)} style={{
                padding: "4px 10px", borderRadius: 14, border: "none", cursor: "pointer",
                fontSize: 12, fontWeight: period === p ? 600 : 400,
                background: period === p ? "#2AABEE" : "#f5f5f5",
                color: period === p ? "#fff" : "#666",
              }}>
                {PERIOD_LABELS[p]}
              </button>
            ))}
          </div>
          <div style={{ display: "flex", gap: 4, marginBottom: 8, flexWrap: "wrap", padding: "0 12px" }}>
            <button onClick={() => setChannelFilter("all")} style={{
              padding: "3px 8px", borderRadius: 10, border: "none", cursor: "pointer",
              fontSize: 11, background: channelFilter === "all" ? "#333" : "#f5f5f5",
              color: channelFilter === "all" ? "#fff" : "#666",
            }}>
              Все
            </button>
            {allChannels.map((ch) => (
              <button key={ch} onClick={() => setChannelFilter(ch)} style={{
                padding: "3px 8px", borderRadius: 10, border: "none", cursor: "pointer",
                fontSize: 11, background: channelFilter === ch ? getChannelColor(ch) : "#f5f5f5",
                color: channelFilter === ch ? "#fff" : "#666",
              }}>
                @{ch}
              </button>
            ))}
          </div>
          <div style={{ height: 1, background: "#e8e8e8", marginBottom: 4 }} />
          {filtered.length === 0 ? (
            <div style={{ textAlign: "center", padding: 32, color: "#aaa", fontSize: 13 }}>
              Нет постов за выбранный период
            </div>
          ) : (
            filtered.map((post) => <PostRow key={`${post.channel}-${post.id}`} post={post} />)
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<TelegramDigest />);
  </script>
</body>
</html>
